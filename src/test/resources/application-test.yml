spring:
  mongodb:
    uri: mongodb://this-is-a-fake-host-to-prevent-local-connections:27017/test_db
    authentication-database: admin

  datasource:
    url: dummy
    username: dummy
    password: dummy
    hikari:
      maximum-pool-size: 2
  kafka:
    topics:
      user: user-registration-topic
      booking: room-booking-topic

    consumer:
      group-id: test-group
      auto-offset-reset: earliest

  liquibase:
    enabled: true

  outbox:
    polling:
      delay:
        ms: 5000
      batch-size: 100

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true   # ANSI-подсветка синтаксиса
        use_sql_comments: true # Добавляет комментарий с именем репозитория/метода
        ddl-auto: validate
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

logging:
  level:
    # при дебагинге DEBUG
    org.hibernate.SQL: OFF
    # при дебагинге TRACE
    org.hibernate.orm.jdbc.bind: OFF