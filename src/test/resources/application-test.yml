spring:
  datasource:
    url: dummy
    username: dummy
    password: dummy
    hikari:
      maximum-pool-size: 2

  liquibase:
    enabled: true

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true   # ANSI-подсветка синтаксиса
        use_sql_comments: true # Добавляет комментарий с именем репозитория/метода
        ddl-auto: validate
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

logging:
  level:
    # при дебагинге DEBUG
    org.hibernate.SQL: OFF
    # при дебагинге TRACE
    org.hibernate.orm.jdbc.bind: OFF